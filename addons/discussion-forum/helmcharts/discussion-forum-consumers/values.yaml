nameOverride: ""
fullnameOverride: ""

image:
  # Same kong-scripts image used by the core kong-consumers chart
  repository: shashank04515/kong-scripts
  tag: "local-upsert"
  pullPolicy: Always
  pullSecrets: []

kong_admin_url: kong
kong_admin_port: 8001

# managed_by scopes ACL group deletions to only the groups declared in this chart.
# Core groups (contentAccess, userAccess, etc.) are never touched.
managed_by: discussion-forum

provisioningAnnotations:
  "helm.sh/hook": post-install,post-upgrade
  "helm.sh/hook-weight": "5"
  "helm.sh/hook-delete-policy": before-hook-creation

configmap:
  enabled: true
  mountPath: /config

global:
  random_string: "randomstring123"
