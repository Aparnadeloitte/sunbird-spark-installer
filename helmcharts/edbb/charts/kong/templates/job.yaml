---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "common.names.fullname" . }}-migrations
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- .Values.provisioningAnnotations | toYaml | nindent 4 }}
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-yugabytepostgres
          image: busybox
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
          - |
            timeout 600 sh -c '
            until nc -z {{.Values.global.yugabyte.host}} {{.Values.global.yugabyte.postgresql_port}}; do echo waiting for yugabytepostgres; sleep 10; done'
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
          args:
            - |
              echo "Starting Kong migrations with iterative up->finish strategy..."
              
              # Step 1: Bootstrap (one-time, idempotent)
              echo "Running bootstrap..."
              if kong migrations bootstrap --v; then
                echo "✓ Bootstrap completed"
              else
                echo "⚠ Bootstrap may have already run (this is normal)"
              fi
              
              # Step 2: Iterative up->finish loop
              MAX_ITERATIONS=10
              for i in $(seq 1 $MAX_ITERATIONS); do
                echo ""
                echo "========================================="
                echo "Migration Iteration $i/$MAX_ITERATIONS"
                echo "========================================="
                
                # Run migrations up (adds new pending migrations)
                echo "Running 'kong migrations up'..."
                UP_OUTPUT=$(kong migrations up --v 2>&1 || true)
                echo "$UP_OUTPUT"
                
                # Wait for DB to settle
                sleep 10
                
                # Run migrations finish (completes pending migrations)
                echo "Running 'kong migrations finish'..."
                FINISH_OUTPUT=$(kong migrations finish --v 2>&1 || true)
                echo "$FINISH_OUTPUT"
                
                # Check if migrations are complete
                if echo "$FINISH_OUTPUT" | grep -q "No pending migrations"; then
                  echo ""
                  echo "✓✓✓ All migrations completed successfully! ✓✓✓"
                  kong migrations list 2>&1 || true
                  exit 0
                elif echo "$FINISH_OUTPUT" | grep -q "Database is already up-to-date"; then
                  echo ""
                  echo "✓✓✓ Database already up-to-date! ✓✓✓"
                  kong migrations list 2>&1 || true
                  exit 0
                elif echo "$FINISH_OUTPUT" | grep -q "New migrations available"; then
                  echo "⚠ More migrations available, continuing to next iteration..."
                  sleep 10
                  continue
                else
                  echo "⚠ Migrations incomplete, continuing to next iteration..."
                  sleep 10
                  continue
                fi
              done
              
              # If we exhausted all iterations, show status and fail
              echo ""
              echo "❌ Migrations incomplete after $MAX_ITERATIONS iterations"
              echo "Current migration status:"
              kong migrations list 2>&1 || true
              exit 1
          env:
            - name: KONG_PG_MAX_CONCURRENT_QUERIES
              value: "1"
            - name: KONG_PG_CONNECT_TIMEOUT
              value: "600"
            - name: KONG_PG_STATEMENT_TIMEOUT
              value: "600000"
            - name: KONG_PG_IDLE_IN_TRANSACTION_SESSION_TIMEOUT
              value: "120000"
            - name: KONG_PG_KEEPALIVE_TIMEOUT
              value: "600"
            - name: KONG_DATABASE
              value: {{ .Values.kong_database }}
            - name: KONG_PG_DATABASE
              value: {{ .Values.kong_pg_database }}
            - name: KONG_PG_HOST
              value: {{ .Values.global.yugabyte.host }}
            - name: KONG_PG_PORT
              value: {{ .Values.global.yugabyte.postgresql_port | quote }}
            - name: KONG_PG_PASSWORD
              value: {{ .Values.global.yugabyte.password }}
            - name: KONG_PG_USER
              value: {{ .Values.global.yugabyte.username }}
            - name: KONG_PG_SSL
              value: {{ .Values.kong_pg_ssl | quote }}
            - name: KONG_PROXY_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_ADMIN_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_PROXY_ERROR_LOG
              value: "/dev/stdout"
            - name: KONG_ADMIN_ERROR_LOG
              value: "/dev/stdout"
      restartPolicy: Never
  backoffLimit: 30
