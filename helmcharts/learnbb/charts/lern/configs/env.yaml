# General Settings

# Keycloak Environment Variables
sunbird_sso_url: "https://{{ .Values.global.domain }}/auth/"
sunbird_sso_realm: "sunbird"
sunbird_sso_username: "admin"
sunbird_sso_password: "admin"
sunbird_sso_client_id: "lms"
sunbird_sso_client_secret: "lms{{ .Values.global.random_string }}"
sunbird_sso_lb_ip: "http://keycloak:8080/"
sunbird_subdomain_keycloak_base_url: "{{ .Values.global.merge_domain }}/"
sunbird_keycloak_required_action_link_expiration_seconds: "3600"
sunbird_keycloak_user_federation_provider_id: "cassandrafederationid"
accesstoken.publickey.basepath: "/keys/"

# Database Environment Variables
sunbird_cassandra_host: "{{ .Values.global.yugabyte.host }}"
sunbird_cassandra_port: "{{ .Values.global.yugabyte.port }}"
sunbird_cassandra_username: "cassandra"
sunbird_cassandra_password: "password"
sunbird_cassandra_keyspace: "sunbird"
sunbird_cassandra_notification_keyspace: sunbird_notifications
sunbird_es_host: "{{ .Values.global.elasticsearch.host }}"
sunbird_es_port: "{{ .Values.global.elasticsearch.port }}"
sunbird_redis_host: "{{ .Values.global.redis.host }}"
sunbird_redis_port: "{{ .Values.global.redis.port }}"
redis.connection.max: "64"
redis.connection.idle.max: "32"
redis.connection.idle.min: "1"
redis.connection.minEvictableIdleTimeSeconds: "120"
redis.connection.timeBetweenEvictionRunsSeconds: "300"
redis.experimentIndex: "10"
redis.dbIndex: "2"

# General Environment Variables
ENV_NAME: "{{ .Values.global.env }}"
sunbird_installation: "{{ .Values.global.env }}"
sunbird_environment: "{{ .Values.global.env }}"
sunbird_instance: "{{ .Values.global.env }}"
isMultiDCEnabled: "false"
sunbird_encryption_key: "{{ .Values.global.random_string }}"
sunbird_encryption_mode: "local"
sunbird_quartz_mode: "cluster"
quartz_shadow_user_migration_timer: "1800"
sunbird_env_logo_url: "https://sunbird.org/assets/images/sunbird-logo.png"
sunbird_web_url: "https://{{.Values.global.domain}}/"
sunbird_installation_display_name: "sunbird {{ .Values.global.env }}"
sunbird_installation_display_name_for_sms: "Sunbird"
sunbird_app_name: "sunbird"
sunbird_time_zone: "Asia/Kolkata"
JAVA_OPTIONS: -Xmx1024m
_JAVA_OPTIONS: "-Dlog4j2.formatMsgNoLookups=true"

# Cloud Storage
sunbird_cloud_service_provider: "{{ .Values.global.cloud_storage_provider }}"
sunbird_account_name: "{{ .Values.global.cloud_storage_access_key }}"
sunbird_account_key: "{{ .Values.global.cloud_storage_secret_key }}"
sunbird_analytics_blob_account_name: "{{ .Values.global.cloud_storage_access_key }}"
sunbird_analytics_blob_account_key: "{{ .Values.global.cloud_storage_secret_key }}"
sunbird_content_cloud_storage_container: "{{ .Values.global.public_container_name }}"
cloud_storage_base_url: https://{{ .Values.global.object_storage_endpoint }}
cloud_storage_cname_url: https://{{ .Values.global.object_storage_endpoint }}
cloud_storage_dial_bucketname: {{ .Values.global.public_container_name }}
cloud_storage_path_prefix_dial: "dial"
cloud_store_base_path_placeholder: ""

# Messaging & Notifications (Email, SMS, Kafka)
sunbird_mail_server_host: "{{ .Values.global.mail_server_host }}"
sunbird_mail_server_port: "{{ .Values.global.mail_server_port }}"
sunbird_mail_server_username: "{{ .Values.global.mail_server_username }}"
sunbird_mail_server_password: "{{ .Values.global.mail_server_password }}"
sunbird_mail_server_from_email: "{{ .Values.global.mail_server_from_email }}"
sunbird_email_max_recipients_limit: "{{ .Values.sunbird_email_max_recipients_limit }}"
sunbird_msg_91_auth: "{{ .Values.global.sunbird_msg_91_auth }}"
sunbird_msg_sender: "{{ .Values.global.sunbird_msg_sender }}"
sunbird_notification_msg_default_sender: "{{ .Values.global.sunbird_msg_sender }}"
sunbird_installation_email: "admin@sunbird.org"
sunbird_course_batch_notification_enabled: "true"
sunbird_course_batch_notification_signature: "sunbird"
notification_category_type_config: "certificateUpdate"
kafka_urls: "{{ .Values.global.kafka.host }}:{{ .Values.global.kafka.port }}"
SUNBIRD_KAFKA_URL: "{{ .Values.global.kafka.host }}:{{ .Values.global.kafka.port }}"
sunbird_notification_kafka_servers_config: "{{ .Values.global.kafka.host }}:{{ .Values.global.kafka.port }}"
sunbird_user_cert_kafka_topic: "{{ .Values.global.env }}.lms.user.account.merge"
sunbird_notification_kafka_topic: "{{ .Values.global.env }}.lms.notification"
user-deletion-broadcast-topic: "{{ .Values.global.env }}.delete.user"
